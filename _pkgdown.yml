template:
  bootstrap: 5
  bootswatch: flatly

development:
  mode: release

url: https://dai540.github.io/NestedWGCNA/

home:
  title: NestedWGCNA
  description: Two-stage gene co-expression network analysis in R for coarse-grained and fine-grained module discovery.
  sidebar:
    structure: []

repo:
  url:
    home: https://github.com/dai540/NestedWGCNA
    source: https://github.com/dai540/NestedWGCNA/blob/main
    issue: https://github.com/dai540/NestedWGCNA/issues/
    user: https://github.com/

navbar:
  structure:
    left: [intro, reference, articles]
    right: [github, search]
  components:
    intro:
      text: Get Started
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fa-github
      href: https://github.com/dai540/NestedWGCNA
      aria-label: GitHub repository

articles:
  - title: Core tutorials
    navbar: Core
    contents:
      - package-article
  - title: Real-data case studies
    navbar: Case Studies
    contents:
      - tutorial-tcga-blca
      - tutorial-all-leukemia
      - tutorial-bladderbatch

reference:
  - title: Core workflows
